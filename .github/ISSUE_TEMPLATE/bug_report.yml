name: Bug report
description: Report a reproducible issue in Iron Ridge.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behavior you saw and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Open the game
        2. Start single-player mode
        3. Drive into cover while firing
        4. See the issue
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Physics
        - Combat
        - Bot AI
        - Multiplayer
        - Rendering
        - Input
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser or runtime
      placeholder: Chrome 126, Firefox 127, Edge 126, Node 24, etc.
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste console output, screenshots, or a short recording link.
