name: Sample brief
description: Add a new example brief for the gallery.
title: "[Brief]: "
labels: ["sample-brief"]
body:
  - type: input
    id: audience
    attributes:
      label: Audience
      placeholder: AI engineers building local tools
    validations:
      required: true
  - type: textarea
    id: signal
    attributes:
      label: Signal
      description: What trend, pain, or behavior should OpenTop analyze?
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
    validations:
      required: true
  - type: input
    id: channels
    attributes:
      label: Launch channels
      placeholder: GitHub, Hacker News, Reddit
