name: Feature request
description: Suggest a gameplay, physics, rendering, map, or multiplayer improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What player or contributor workflow gets better if this exists?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest playable version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Physics
        - Combat
        - Bot AI
        - Multiplayer
        - Map
        - Rendering
        - Input
        - Documentation
    validations:
      required: true
