name: Sync Labels

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/sync-labels.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
